<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro – Quiz App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 8px; }
        p.subtitle { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 18px;
            transition: border-color 0.2s;
            background: #fff;
        }
        input:focus, select:focus { outline: none; border-color: #4361ee; }
        button {
            width: 100%;
            padding: 12px;
            background: #4361ee;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #3451d1; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
        .footer a { color: #4361ee; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os campos abaixo para se registrar.</p>

    <form th:action="@{/v1/user}" method="post">
        <label for="username">Nome de usuário</label>
        <input
            type="text"
            id="username"
            name="username"
            placeholder="seu_usuario"
            minlength="3"
            required
        />

        <label for="email">E-mail</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="voce@email.com"
            required
        />

        <label for="password">Senha</label>
        <input
            type="password"
            id="password"
            name="password"
            placeholder="mínimo 6 caracteres"
            minlength="6"
            required
        />

        <label for="role">Função</label>
        <select id="role" name="role" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="USER">Usuário</option>
            <option value="ADMIN">Administrador</option>
        </select>

        <button type="submit">Registrar</button>
    </form>

    <div class="footer">
        Já tem conta? <a th:href="@{/v1/user/login}">Entrar</a>
    </div>
</div>
</body>
</html>
